    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #fff;
      color: #000;
      -webkit-font-smoothing: antialiased;
    }

    /* ── COMPARISON ── */
    .comparison { border-bottom: 2px solid #000; }

    .choice {
      padding: 24px 24px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.06s;
    }
    .choice:hover  { background: #f5f5f5; }
    .choice:active { background: #ebebeb; }

    .choice-text {
      font-size: clamp(20px, 4.8vw, 28px);
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .or-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 2px 24px;
    }
    .or-rule { flex: 1; height: 1px; background: #e0e0e0; }
    .or-skip {
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-size: 20px;
      color: #ccc;
      padding: 0 4px;
      line-height: 1;
      -webkit-tap-highlight-color: transparent;
      transition: color 0.1s;
    }
    .or-skip:hover  { color: #555; }
    .or-skip:active { color: #000; }

    /* ── RANKED LIST (the hero) ── */
    .list-section { padding: 0 28px 100px; overflow: visible; }

    .list-empty {
      padding: 44px 0 0;
      font-size: 14px;
      font-weight: 400;
      color: #ccc;
      letter-spacing: 0.06em;
    }

    .r-list { list-style: none; padding: 0 4px; margin: 0; overflow: visible; }

    .r-item {
      display: grid;
      grid-template-columns: 36px 1fr;
      align-items: start;
      gap: 0 10px;
      padding: 9px 0;
      transform-origin: left center;
      will-change: transform;
    }

    .r-num {
      font-size: 13px;
      font-weight: 400;
      color: #000;
      line-height: 1.55;
      letter-spacing: 0.03em;
      padding-top: 2px;
    }

    .r-name {
      font-size: clamp(20px, 4.5vw, 28px);
      font-weight: 700;
      line-height: 1.2;
    }

    @keyframes itemIn {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .r-item.is-new { animation: itemIn 0.22s ease both; }
  </style>
</head>

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function applyElo(winner, loser) {
  const K = 32;
  const exp = 1 / (1 + Math.pow(10, (loser.elo - winner.elo) / 400));
  winner.elo += K * (1 - exp);
  loser.elo  += K * (0 - (1 - exp));
  winner.compared++;
  loser.compared++;
}

function pad(n) { return String(n).padStart(2, '0'); }

// Stable per-item rotation — assigned once, never changes
const itemStyles = {};
function getItemData(id) {
  if (!itemStyles[id]) {
    const rot = (Math.random() - 0.5) * 2.8;
    const tx  = (Math.random() - 0.5) * 5;
    itemStyles[id] = { rot, tx };
  }
  return itemStyles[id];
}

function getItemTransform(id) {
  const d = getItemData(id);
  return `rotate(${d.rot.toFixed(2)}deg) translateX(${d.tx.toFixed(1)}px)`;
}

const S = {
  pool: [], remaining: [], current: null,
  recentPairs: [], count: 0, started: true, prevRanked: [],
};

function initItems() {
  const items = shuffle(ITEMS).map((text, id) => ({ id, text, elo: 1000, compared: 0 }));
  S.pool = items.slice(0, 12);
  S.remaining = items.slice(12);
}

function getMatchup() {
  if (S.remaining.length > 0 && S.count % 4 === 0) {
    const n = Math.min(2, S.remaining.length);
    for (let i = 0; i < n; i++) S.pool.push(S.remaining.shift());
  }
  const sorted = [...S.pool].sort((a, b) => b.elo - a.elo);
  const n = sorted.length;
  for (let attempt = 0; attempt < 50; attempt++) {
    let i;
    if (Math.random() < 0.65) {
      const lo = Math.floor(n * 0.15);
      const hi = Math.max(lo + 2, Math.floor(n * 0.85));
      i = lo + Math.floor(Math.random() * (hi - lo - 1));
    } else {
      i = Math.floor(Math.random() * (n - 1));
    }
    i = Math.min(i, n - 2);
    const a = sorted[i], b = sorted[i + 1];
    const key = [a.id, b.id].sort().join(',');
    if (!S.recentPairs.includes(key)) {
      S.recentPairs.push(key);
      if (S.recentPairs.length > 20) S.recentPairs.shift();
      return [a, b];
    }
  }
  return [sorted[0], sorted[1]];
}

function pick(winner, loser) {
  applyElo(winner, loser);
  S.count++;
  S.current = getMatchup();
  render();
}

function rankedItems() {
  return [...S.pool].filter(i => i.compared > 0).sort((a, b) => b.elo - a.elo);
}

function renderGame() {
  const [a, b] = S.current;
  const list = rankedItems();
  const prevIds = new Set(S.prevRanked);
  S.prevRanked = list.map(i => i.id);

  const listHTML = list.length === 0
    ? ''
    : `<ol class="r-list">${list.map((item, i) => `
      <li class="r-item${!prevIds.has(item.id) ? ' is-new' : ''}" style="transform:${getItemTransform(item.id)}">
        <span class="r-num">${pad(i + 1)}</span>
        <span class="r-name">${item.text}</span>
      </li>`).join('')}</ol>`;

  return `
<div class="comparison">
      <div class="choice" id="pick-a"><div class="choice-text">${a.text}</div></div>
      <div class="or-row"><div class="or-rule"></div><button class="or-skip" id="btn-skip">&#x20E0;</button><div class="or-rule"></div></div>
      <div class="choice" id="pick-b"><div class="choice-text">${b.text}</div></div>
    </div>
    <div class="list-section">${listHTML}</div>`;
}

function skip() {
  S.current = getMatchup();
  render();
}

function render() {
  document.getElementById('app').innerHTML = renderGame();
  const [a, b] = S.current;
  document.getElementById('pick-a').addEventListener('click', () => pick(a, b));
  document.getElementById('pick-b').addEventListener('click', () => pick(b, a));
  document.getElementById('btn-skip').addEventListener('click', skip);
}

initItems();
S.current = getMatchup();
render();
</script>
